// In production, point this at your own backend proxy (see netlify/functions/claude.js
// referenced at the bottom of this file) instead of calling Anthropic directly,
// so your API key is never exposed in browser code.
async function callClaude(system, user) {
  const endpoint = window.NOVA_API_ENDPOINT || "/.netlify/functions/claude";
  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, message: user }),
  });
  if (!res.ok) {
    let detail = "";
    try { detail = (await res.json()).error || ""; } catch(e) {}
    throw new Error("API error " + res.status + (detail ? " — " + detail : " — is your Netlify Function deployed and is your API key set?"));
  }
  const data = await res.json();
  return data.text || data.content?.map(b=>b.text||"").join("") || "";
}

// Some models (esp. Llama via Groq) wrap JSON in chatty text or markdown
// fences more often than Claude. This pulls out the first {...} or [...]
// block so JSON.parse succeeds reliably regardless of provider.
function extractJSON(raw) {
  let cleaned = raw.replace(/```json|```/g, "").trim();
  const firstBrace = cleaned.indexOf("{");
  const firstBracket = cleaned.indexOf("[");
  let start = -1;
  if (firstBrace === -1) start = firstBracket;
  else if (firstBracket === -1) start = firstBrace;
  else start = Math.min(firstBrace, firstBracket);
  if (start === -1) return cleaned;
  const lastBrace = cleaned.lastIndexOf("}");
  const lastBracket = cleaned.lastIndexOf("]");
  const end = Math.max(lastBrace, lastBracket);
  if (end === -1 || end < start) return cleaned;
  return cleaned.slice(start, end + 1);
}

function Spark({ data, color, h=36 }) {
  if (!data||data.length<2) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max-min||1;
  const pts = data.map((v,i)=>(i/(data.length-1))*100+","+(h-((v-min)/range)*(h-4))).join(" ");
  const area = "0,"+h+" "+pts+" 100,"+h;
  const gid = "sg"+color.replace("#","");
  return (
    <svg width="100%" height={h} viewBox={"0 0 100 "+h} preserveAspectRatio="none" style={{ display:"block" }}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={area} fill={"url(#"+gid+")"}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

  const max = Math.max(...data.map(d=>d[valueKey]));
  return (

      {data.map((d,i)=>(
        <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
          <div style={{ width:"100%", background:"linear-gradient(to top,"+color+","+color+"88)", borderRadius:"4px 4px 0 0", height:(d[valueKey]/max)*100+"%", minHeight:4, transition:"height .4s" }}/>
          <span style={{ fontSize:10, color:T.textDim }}>{d[labelKey]}</span>
        </div>
      ))}

  );
}

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
            <span style={{ fontWeight:700, fontSize:14, color:T.text }}>{insight.title}</span>
            {insight.applied && <Tag color={T.green}>Applied</Tag>}
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <Tag color={priorityColor}>{insight.priority} priority</Tag>
            <Tag color={T.accent}>{insight.category}</Tag>
            <span style={{ fontSize:12, color:T.green, fontWeight:700 }}>{insight.impact}</span>
          </div>
        </div>
        <span style={{ color:T.textDim, fontSize:14, flexShrink:0 }}>{expanded?"▲":"▼"}</span>
      </div>
      {expanded && (
        <div style={{ borderTop:"1px solid "+T.border, padding:"16px 20px 20px" }}>
          <p style={{ color:T.textSub, fontSize:13.5, lineHeight:1.7, margin:"0 0 16px" }}>{insight.body}</p>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {!insight.applied && <Btn small variant="green" onClick={()=>onApply(insight.id)}>✓ Apply Insight</Btn>}
            <Btn small variant="ghost">View Evidence</Btn>
          </div>
        </div>
      )}
    </Card>
  );
}

const INIT_FORM={businessName:"",industry:"",location:"",targetAudience:"",products:"",goal:"",brandVoice:"",competitors:"",platforms:[]};

function StrategyView() {
  const { isMobile, isTablet } = useBreakpoint();
  const [form,setForm]=useState(INIT_FORM);

  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);

  const [copied,setCopied]=useState(false);
  const valid=form.businessName&&form.industry&&form.targetAudience&&form.products&&form.goal&&form.platforms.length>0;

  const iStyle={ width:"100%", background:T.surface2, border:"1px solid "+T.border, borderRadius:10, padding:"12px 14px", color:T.text, fontSize:14, outline:"none", fontFamily:"inherit", boxSizing:"border-box" };
  const lStyle={ fontSize:11, fontWeight:700, letterSpacing:"0.08em", color:T.textSub, textTransform:"uppercase", display:"block", marginBottom:7 };

  const generate=async()=>{
    setLoading(true);setError(null);
    try{
      const raw=await callClaude(
        "You are NOVA, an elite AI social media strategist. Return ONLY valid JSON — no markdown, no backticks. Keys: brandStrategy, contentStrategy, audienceProfile, competitorAnalysis, contentCalendar, campaignPlan, growthStrategy. Each value: 2-4 sentence professional insight string.",
        "Business:"+form.businessName+"\nIndustry:"+form.industry+"\nLocation:"+form.location+"\nAudience:"+form.targetAudience+"\nProducts:"+form.products+"\nGoal:"+form.goal+"\nVoice:"+form.brandVoice+"\nPlatforms:"+form.platforms.join(", ")+"\n\nGenerate complete go-to-market strategy."
      );
      setStrategy(JSON.parse(extractJSON(raw)));
      setDone(true);
    }catch(e){setError("Generation failed: "+e.message+". Make sure your Netlify Function is deployed (see setup guide below).");}
    finally{setLoading(false);}
  };

  const copyAll=()=>{
    if(!strategy)return;
    navigator.clipboard.writeText(STRAT_ITEMS.map(s=>s.label.toUpperCase()+"\n"+(strategy[s.key]||"")).join("\n\n"));
    setCopied(true);setTimeout(()=>setCopied(false),2000);

  return (
    <div>
      <SectionHeader title="Strategy Engine" sub="Enter your business details. NOVA builds your complete go-to-market strategy." action={done&&<div style={{display:"flex",gap:8}}><Btn variant="ghost" small onClick={()=>{setDone(false);setStrategy(null);}}>← New</Btn><Btn small onClick={copyAll}>{copied?"✓ Copied":"⊕ Copy All"}</Btn></div>} />
      {!done?(
        <Card>
          <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:16, marginBottom:16 }}>
            <div><label style={lStyle}>Business Name *</label><input value={form.businessName} onChange={e=>setForm(f=>({...f,businessName:e.target.value}))} placeholder="e.g. Bloom Wellness Studio" style={iStyle}/></div>
            <div><label style={lStyle}>Location</label><input value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="e.g. Austin, TX" style={iStyle}/></div>
            <div><label style={lStyle}>Industry *</label><select value={form.industry} onChange={e=>setForm(f=>({...f,industry:e.target.value}))} style={iStyle}><option value="">Select...</option>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select></div>
            <div><label style={lStyle}>Primary Goal *</label><select value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} style={iStyle}><option value="">Select...</option>{GOALS.map(g=><option key={g}>{g}</option>)}</select></div>
            <div><label style={lStyle}>Target Audience *</label><input value={form.targetAudience} onChange={e=>setForm(f=>({...f,targetAudience:e.target.value}))} placeholder="e.g. Women 25–40, health-conscious" style={iStyle}/></div>
            <div><label style={lStyle}>Brand Voice</label><select value={form.brandVoice} onChange={e=>setForm(f=>({...f,brandVoice:e.target.value}))} style={iStyle}><option value="">Select...</option>{VOICES.map(v=><option key={v}>{v}</option>)}</select></div>
          </div>
          <div style={{marginBottom:16}}><label style={lStyle}>Products / Services *</label><textarea value={form.products} onChange={e=>setForm(f=>({...f,products:e.target.value}))} placeholder="e.g. Yoga classes, nutrition coaching" rows={3} style={{...iStyle,resize:"vertical"}}/></div>
          <div style={{marginBottom:24}}>
            <label style={lStyle}>Platforms *</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {ALL_PLAT.map(p=>{const on=form.platforms.includes(p),c=PLAT_COLORS[p];return<button key={p} onClick={()=>setForm(f=>({...f,platforms:f.platforms.includes(p)?f.platforms.filter(x=>x!==p):[...f.platforms,p]}))} style={{padding:"7px 14px",borderRadius:8,border:"1px solid "+(on?c:T.border),background:on?c+"22":"transparent",color:on?T.text:T.textSub,fontWeight:600,fontSize:12,cursor:"pointer"}}>{p}</button>;})}
            </div>
          </div>
          {error&&<div style={{background:T.redSoft,border:"1px solid "+T.red+"40",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:T.red}}>{error}</div>}
          <Btn onClick={generate} disabled={!valid||loading}>{loading?<React.Fragment><Spinner size={14} color="#fff"/>Generating...</React.Fragment>:"◈ Generate Strategy"}</Btn>
        </Card>
      ):(
        <React.Fragment>
          <div style={{padding:"14px 18px",background:T.greenSoft,border:"1px solid "+T.greenBorder,borderRadius:12,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:T.green,fontSize:18}}>✓</span>
            <span style={{color:T.green,fontWeight:600,fontSize:14}}>Strategy generated for <strong>{form.businessName}</strong></span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
            {STRAT_ITEMS.map(s=>(
              <Card key={s.key} style={{padding:20}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{width:30,height:30,background:s.color+"18",border:"1px solid "+s.color+"33",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:s.color,fontSize:14}}>{s.icon}</div>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",color:T.textSub,textTransform:"uppercase"}}>{s.label}</span>
                </div>
                <p style={{margin:0,fontSize:13.5,color:T.text,lineHeight:1.7}}>{strategy?strategy[s.key]:"—"}</p>
              </Card>
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

// ─── CONTENT VIEW ─────────────────────────────────────────────────────────
function ContentView() {
  const { isMobile } = useBreakpoint();
  const [bizName,setBizName]=useState("");
  const [industry,setIndustry]=useState("");
  const [audience,setAudience]=useState("");
  const [goal,setGoal]=useState("");
  const [platforms,setPlatforms]=useState([]);
  const [plan,setPlan]=useState("30");
  const [posts,setPosts]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [filter,setFilter]=useState("All");
  const [expanded,setExpanded]=useState(null);
  const [copiedId,setCopiedId]=useState(null);
  const iStyle={ width:"100%", background:T.surface2, border:"1px solid "+T.border, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:13, outline:"none", fontFamily:"inherit", boxSizing:"border-box" };
  const lStyle={ fontSize:11, fontWeight:700, letterSpacing:"0.08em", color:T.textSub, textTransform:"uppercase", display:"block", marginBottom:7 };
  const planConf=PLAN_OPTS.find(p=>p.v===plan);
  const valid=bizName&&industry&&audience&&goal&&platforms.length>0;
  const filtered=filter==="All"?posts:posts.filter(p=>p.platform===filter);

  const generate=async()=>{
    setLoading(true);setError(null);
    try{
      const raw=await callClaude(
        "You are NOVA. Return ONLY valid JSON. Object with \"posts\" array of exactly "+planConf.n+" items. Each: {day,platform,type,hook,caption,cta,hashtags,bestTime}",
        "Business:"+bizName+"|Industry:"+industry+"|Audience:"+audience+"|Goal:"+goal+"|Platforms:"+platforms.join(",")+". Generate "+plan+"-day plan with "+planConf.n+" posts across all platforms."
      );
      setPosts(JSON.parse(extractJSON(raw)).posts||[]);
    }catch(e){setError("Failed: "+e.message);}
    finally{setLoading(false);}
  };

  const exportCSV=()=>{
    const h=["Day","Platform","Type","Hook","Caption","CTA","Hashtags","Best Time"];
    const rows=posts.map(p=>[p.day,p.platform,p.type,'"'+(p.hook||"").replace(/"/g,'""')+'"','"'+(p.caption||"").replace(/"/g,'""')+'"','"'+(p.cta||"").replace(/"/g,'""')+'"',p.hashtags,p.bestTime].join(","));
    const blob=new Blob([[h.join(","),...rows].join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="NOVA_"+bizName+".csv";a.click();
  };

  const copyPost=(p,id)=>{ navigator.clipboard.writeText("HOOK: "+p.hook+"\n\nCAPTION: "+p.caption+"\n\nCTA: "+p.cta+"\n\nHASHTAGS: "+p.hashtags); setCopiedId(id); setTimeout(()=>setCopiedId(null),2000); };

  return (
    <div>
      <SectionHeader title="Content Factory" sub="One click. A full month of platform-native AI posts." />
      <Card style={{marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14,marginBottom:14}}>
          <div><label style={lStyle}>Business Name</label><input value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="e.g. Bloom Wellness" style={iStyle}/></div>
          <div><label style={lStyle}>Industry</label><select value={industry} onChange={e=>setIndustry(e.target.value)} style={iStyle}><option value="">Select...</option>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select></div>
          <div><label style={lStyle}>Target Audience</label><input value={audience} onChange={e=>setAudience(e.target.value)} placeholder="e.g. Women 25–40" style={iStyle}/></div>
          <div><label style={lStyle}>Goal</label><select value={goal} onChange={e=>setGoal(e.target.value)} style={iStyle}><option value="">Select...</option>{GOALS.map(g=><option key={g}>{g}</option>)}</select></div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lStyle}>Platforms</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {ALL_PLAT.map(p=>{const on=platforms.includes(p),c=PLAT_COLORS[p];return<button key={p} onClick={()=>setPlatforms(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p])} style={{padding:"6px 12px",borderRadius:7,border:"1px solid "+(on?c:T.border),background:on?c+"22":"transparent",color:on?T.text:T.textSub,fontWeight:600,fontSize:12,cursor:"pointer"}}>{p}</button>;})}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {PLAN_OPTS.map(p=><button key={p.v} onClick={()=>setPlan(p.v)} style={{padding:"8px 16px",borderRadius:8,border:"1px solid "+(plan===p.v?T.accent:T.border),background:plan===p.v?T.accentSoft:"transparent",color:plan===p.v?T.accent:T.textSub,fontWeight:600,fontSize:13,cursor:"pointer"}}>{p.l} <span style={{opacity:.6,fontSize:11}}>·{p.n} posts</span></button>)}
          <Btn onClick={generate} disabled={!valid||loading} style={{marginLeft:"auto"}}>{loading?<React.Fragment><Spinner size={14} color="#fff"/>Generating...</React.Fragment>:"✦ Generate"}</Btn>
        </div>
        {error&&<div style={{marginTop:14,background:T.redSoft,border:"1px solid "+T.red+"40",borderRadius:10,padding:"12px 16px",fontSize:13,color:T.red}}>{error}</div>}
      </Card>
      {posts.length>0&&(
        <React.Fragment>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {["All",...platforms].map(p=><button key={p} onClick={()=>setFilter(p)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid "+(filter===p?(PLAT_COLORS[p]||T.accent):T.border),background:filter===p?(PLAT_COLORS[p]||T.accent)+"22":"transparent",color:filter===p?T.text:T.textSub,fontWeight:600,fontSize:12,cursor:"pointer"}}>{p}</button>)}
            <div style={{marginLeft:"auto",display:"flex",gap:8}}>
              <Btn variant="dark" small onClick={exportCSV}>⬡ CSV</Btn>
              <Btn variant="green" small onClick={()=>navigator.clipboard.writeText(posts.map(p=>"DAY "+p.day+"|"+p.platform+"|"+p.type+"\nHook:"+p.hook+"\nCaption:"+p.caption+"\nCTA:"+p.cta).join("\n\n---\n\n"))}>⊕ Copy All</Btn>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filtered.map((post,i)=>{
              const isOpen=expanded===i;
              const pc=PLAT_COLORS[post.platform]||T.accent;
              const tc=TYPE_COLORS[post.type]||T.accent;
              return(
                <Card key={i} style={{padding:0,overflow:"hidden"}}>
                  <div style={{padding:"13px 18px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",flexWrap:isMobile?"wrap":"nowrap"}} onClick={()=>setExpanded(isOpen?null:i)}>
                    <div style={{width:40,height:40,background:T.accentSoft,border:"1px solid "+T.accentBorder,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:T.accent,flexShrink:0}}>D{post.day}</div>
                    <span style={{background:pc+"20",border:"1px solid "+pc+"40",color:pc,borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700,flexShrink:0}}>{post.platform}</span>
                    <span style={{background:tc+"20",border:"1px solid "+tc+"40",color:tc,borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700,flexShrink:0}}>{post.type}</span>
                    <p style={{margin:0,fontSize:13,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{post.hook}</p>
                    <span style={{fontSize:11,color:T.textDim,flexShrink:0}}>{post.bestTime}</span>
                    <span style={{color:T.textDim,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
                  </div>
                  {isOpen&&(
                    <div style={{borderTop:"1px solid "+T.border,padding:"18px"}}>
                      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:16,marginBottom:14}}>
                        <div><p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.textSub,textTransform:"uppercase"}}>Caption</p><p style={{margin:0,fontSize:13.5,color:T.text,lineHeight:1.7}}>{post.caption}</p></div>
                        <div>
                          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.textSub,textTransform:"uppercase"}}>CTA</p>
                          <p style={{margin:"0 0 12px",fontSize:13.5,color:T.green}}>{post.cta}</p>
                          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.textSub,textTransform:"uppercase"}}>Hashtags</p>
                          <p style={{margin:0,fontSize:13,color:T.textSub}}>{post.hashtags}</p>
                        </div>
                      </div>
                      <Btn variant="ghost" small onClick={()=>copyPost(post,i)}>{copiedId===i?"✓ Copied":"⊕ Copy Post"}</Btn>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </React.Fragment>
      )}
      {!posts.length&&!loading&&<Card style={{textAlign:"center",padding:60,background:T.surface2,border:"1px dashed "+T.border}}><div style={{fontSize:40,marginBottom:12,opacity:.2}}>✦</div><p style={{color:T.textSub,margin:0}}>Fill in your details and click Generate.</p></Card>}
    </div>
  );
}

      )}
    </div>
  );
}

      </Card>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
        {[["◈","Strategy Engine","Build complete brand & content strategy","strategy",T.accent],["✦","Content Factory","Generate full content calendars","content",T.gold],["↗","Publishing Center","Auto-publish to all 6 platforms","publishing",T.green],["∿","Analytics & AI","Track performance + self-optimize","analytics",T.purple]].map(([icon,title,desc,id,color])=>(
          <button key={id} onClick={()=>setActive(id)} style={{background:T.surface,border:"1px solid "+T.border,borderRadius:14,padding:"20px",cursor:"pointer",textAlign:"left",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=color+"60";e.currentTarget.style.background=color+"08";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.surface;}}>
            <div style={{fontSize:22,color,marginBottom:10}}>{icon}</div>
            <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:4}}>{title}</div>
            <div style={{fontSize:12,color:T.textSub}}>{desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────
const NAV=[
  {id:"home",      icon:"⬡", label:"Dashboard"},
  {id:"strategy",  icon:"◈", label:"Strategy Engine"},
  {id:"content",   icon:"✦", label:"Content Factory"},
  {id:"publishing",icon:"↗", label:"Publishing Center"},
  {id:"analytics", icon:"∿", label:"Analytics + AI", badge:"Phase 5"},
];

function Sidebar({ active, setActive, mobileOpen, setMobileOpen }) {
  const { isMobile } = useBreakpoint();
  const { user, profile, signOut } = useAuth();
  const plan = PLANS[profile?profile.plan:"free"];

  const content = (
    <div style={{ width:220, height:"100%", background:T.surface, borderRight:"1px solid "+T.border, display:"flex", flexDirection:"column" }}>
      <div style={{padding:"18px 16px 14px",borderBottom:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,"+T.accent+",#a78bfa)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#fff",boxShadow:"0 0 16px "+T.accent+"50"}}>N</div>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:17,color:T.text,lineHeight:1}}>NOVA</div>
            <div style={{fontSize:9,color:T.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>AI Social Employee</div>
          </div>
        </div>
        {isMobile&&<button onClick={()=>setMobileOpen(false)} style={{background:"none",border:"none",color:T.textSub,cursor:"pointer",fontSize:20}}>×</button>}
      </div>
      <nav style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
        {NAV.map(item=>{
          const on=active===item.id;
          return(
            <button key={item.id} onClick={()=>{setActive(item.id);if(isMobile)setMobileOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:10,border:"none",background:on?T.accentSoft:"transparent",cursor:"pointer",marginBottom:3,transition:"all .15s"}}>
              <span style={{fontSize:15,color:on?T.accent:T.textDim,width:20,textAlign:"center"}}>{item.icon}</span>
              <span style={{fontSize:13,fontWeight:on?700:500,color:on?T.text:T.textSub,flex:1,textAlign:"left"}}>{item.label}</span>
              {item.badge&&<span style={{background:T.accent,color:"#fff",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:4,whiteSpace:"nowrap"}}>{item.badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{padding:"10px 12px 14px",borderTop:"1px solid "+T.border}}>
        <div style={{background:T.surface2,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{background:plan.color+"20",border:"1px solid "+plan.color+"40",color:plan.color,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700}}>{plan.name} Plan</span>
            <span style={{fontSize:10,color:T.textDim}}>v1.5.0</span>
          </div>
          <div style={{fontSize:11,color:T.textDim}}>All 5 phases active</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surface2,borderRadius:10}}>
          <div style={{width:26,height:26,background:"linear-gradient(135deg,"+T.accent+",#a78bfa)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#fff"}}>{(user?user.email:"D").slice(0,2).toUpperCase()}</div>
          <span style={{fontSize:12,color:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?user.email:"demo@nova.ai"}</span>
          <button onClick={signOut} title="Sign out" style={{background:"none",border:"none",color:T.textDim,cursor:"pointer",fontSize:13}}>⇥</button>
        </div>
      </div>
    </div>
  );

  if (isMobile) {
    return mobileOpen ? (
      <div style={{position:"fixed",inset:0,zIndex:200,display:"flex"}}>
        <div style={{width:220,height:"100%"}}>{content}</div>
        <div style={{flex:1,background:"rgba(0,0,0,0.6)"}} onClick={()=>setMobileOpen(false)}/>
      </div>
    ) : null;
  }
  return <div style={{width:220,minWidth:220,height:"100vh",position:"sticky",top:0}}>{content}</div>;
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────
function AuthScreen() {
  const { demoSignIn } = useAuth();
  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"20%",left:"50%",transform:"translateX(-50%)",width:600,height:400,background:"radial-gradient(ellipse,"+T.accent+"18 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:420,position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:56,height:56,background:"linear-gradient(135deg,"+T.accent+",#a78bfa)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:24,color:"#fff",margin:"0 auto 16px",boxShadow:"0 0 40px "+T.accent+"60"}}>N</div>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,color:T.text,margin:"0 0 6px"}}>NOVA</h1>
          <p style={{color:T.textSub,fontSize:15,margin:0}}>Your AI Social Media Employee</p>
        </div>
        <Card>
          <div style={{marginBottom:20}}>
            {[["Phase 1 ◈","Strategy Engine","Complete go-to-market strategy"],["Phase 2 ✦","Content Factory","7/30/90-day AI content plans"],["Phase 3 🔐","Auth + Billing","Supabase + Stripe ready"],["Phase 4 ↗","Auto Publishing","All 6 platforms connected"],["Phase 5 ∿","Analytics + AI","Self-optimization loop"]].map(([phase,title,desc])=>(
              <div key={phase} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid "+T.border}}>
                <span style={{fontSize:12,fontWeight:700,color:T.accent,width:80,flexShrink:0}}>{phase}</span>
                <div><div style={{fontSize:13,fontWeight:700,color:T.text}}>{title}</div><div style={{fontSize:12,color:T.textDim}}>{desc}</div></div>
                <span style={{color:T.green,fontSize:14,marginLeft:"auto",flexShrink:0}}>✓</span>
              </div>
            ))}
          </div>
          <Btn full onClick={demoSignIn}>→ Enter Dashboard</Btn>
          <p style={{textAlign:"center",fontSize:12,color:T.textDim,marginTop:14,marginBottom:0}}>Demo mode — no signup needed</p>
        </Card>
      </div>
    </div>
  );
}

// ─── MAIN DASHBOARD ───────────────────────────────────────────────────────
function Dashboard() {
  const [active, setActive] = useState("home");
  const [mobileOpen, setMobileOpen] = useState(false);
  const { isMobile } = useBreakpoint();

  const views = {
    home:      <HomeView setActive={setActive}/>,
    strategy:  <StrategyView/>,
    content:   <ContentView/>,
    publishing:<PublishingView/>,
    analytics: <AnalyticsView/>,
  };

  return (
    <div style={{display:"flex",height:"100vh",background:T.bg,overflow:"hidden"}}>
      <Sidebar active={active} setActive={setActive} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:isMobile?"0 16px":"0 28px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",background:T.surface,borderBottom:"1px solid "+T.border,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {isMobile&&<button onClick={()=>setMobileOpen(true)} style={{background:"none",border:"none",color:T.textSub,cursor:"pointer",fontSize:22,padding:"4px",lineHeight:1}}>☰</button>}
            <span style={{fontSize:14,fontWeight:700,color:T.text}}>{(NAV.find(n=>n.id===active)||{}).label||"Dashboard"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:T.green,boxShadow:"0 0 8px "+T.green,animation:"pulse 2s infinite"}}/>
            {!isMobile&&<span style={{fontSize:12,color:T.textSub}}>All systems live</span>}
            <span style={{background:T.greenSoft,border:"1px solid "+T.greenBorder,color:T.green,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:6}}>Phase 5 ✓</span>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:isMobile?"20px 16px 60px":"32px 28px 80px"}}>
          {views[active]||views.home}
        </div>
      </div>
    </div>
  );
}

function App() {
  const { user } = useAuth();
  return user ? <Dashboard/> : <AuthScreen/>;
}

function Root() {
  return (
    <AuthProvider>
      <App/>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
